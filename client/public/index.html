<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapChat - Instant. Encrypted. Yours.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="brand">
                <div class="logo-icon">⚡</div>
                <h1>ZapChat</h1>
                <p class="subtitle">Instant. Encrypted. Yours.</p>
            </div>

            <div class="auth-tabs">
                <button id="auth-signin-tab" class="tab-btn active">Sign In</button>
                <button id="auth-signup-tab" class="tab-btn">Create Account</button>
            </div>

            <h2 id="auth-title">Sign In</h2>

            <form id="auth-form">
                <div class="input-group">
                    <label for="username-input">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username-input" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password-input">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password-input" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" id="auth-submit-btn" class="submit-btn">
                    Sign In <span class="arrow">→</span>
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
