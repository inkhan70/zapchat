name: ZapChat CI

on:
  push:
    branches: ["main", "echochat1", "feature/auth-production"]
  pull_request:
    branches: ["main", "echochat1", "feature/auth-production"]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package.json

      - name: Install backend dependencies
        working-directory: server
        run: npm install

      - name: Verify backend syntax
        working-directory: server
        run: npm test

      - name: Smoke-check root scripts
        run: npm test
